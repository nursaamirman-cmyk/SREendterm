groups:
  - name: sre_slo_alerts
    interval: 30s
    rules:

      # SLO: Availability >= 99%
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "Service {{ $labels.job }} has been unreachable for more than 1 minute. SLO breach: Availability < 99%"

      # SLO: Error Rate <= 1%
      - alert: HighErrorRate
        expr: |
          (
            sum by (service) (rate(http_requests_total{status=~"5.."}[5m]))
            /
            sum by (service) (rate(http_requests_total[5m]))
          ) > 0.01
        for: 2m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.service }}. SLO breach: Error rate > 1%"

      # SLO: Latency <= 200ms
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum by (service, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 0.2
        for: 2m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "High p95 latency on {{ $labels.service }}"
          description: "p95 latency is {{ $value | humanizeDuration }} on {{ $labels.service }}. SLO target: ≤ 200ms"

      # High CPU
      - alert: HighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% for more than 5 minutes"

      # High Memory
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85%"

      # Order Service specific
      - alert: OrderServiceFailure
        expr: up{job="order-service"} == 0
        for: 30s
        labels:
          severity: critical
          service: order-service
        annotations:
          summary: "Order Service is DOWN"
          description: "Order Service is not responding. Orders cannot be processed."
