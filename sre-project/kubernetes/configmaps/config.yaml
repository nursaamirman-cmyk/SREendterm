apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-config
  namespace: sre-project
data:
  DB_HOST: "postgres-service"
  DB_NAME: "sre_db"
  DB_USER: "sre_user"
  REDIS_HOST: "redis-service"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: sre-secrets
  namespace: sre-project
type: Opaque
stringData:
  DB_PASSWORD: "sre_password"
  JWT_SECRET: "super-secret-jwt-key-change-in-prod"
