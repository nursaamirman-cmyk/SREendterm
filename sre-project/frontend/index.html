<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRE Microservices Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  header { background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.5rem; color: #38bdf8; }
  .badge { background: #22c55e; color: #fff; padding: 2px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
  .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; }
  .card h3 { font-size: 1rem; color: #94a3b8; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem; }
  .card .value { font-size: 2rem; font-weight: 700; color: #38bdf8; }
  .card .sub { font-size: 0.85rem; color: #64748b; margin-top: 0.25rem; }
  .services { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; }
  .service { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 1rem; display: flex; align-items: center; gap: 0.75rem; cursor: pointer; transition: border-color 0.2s; }
  .service:hover { border-color: #38bdf8; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; flex-shrink: 0; animation: pulse 2s infinite; }
  .dot.loading { background: #f59e0b; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .service-name { font-weight: 600; font-size: 0.9rem; }
  .service-port { color: #64748b; font-size: 0.75rem; }
  h2 { font-size: 1.25rem; color: #e2e8f0; margin-bottom: 1rem; }
  .links { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1.5rem; }
  .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 8px; text-decoration: none; font-size: 0.875rem; font-weight: 600; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-blue { background: #0ea5e9; color: #fff; }
  .btn-green { background: #22c55e; color: #fff; }
  .btn-purple { background: #8b5cf6; color: #fff; }
</style>
</head>
<body>
<header>
  <h1>⚡ SRE Microservices Platform</h1>
  <span class="badge">LIVE</span>
</header>
<div class="container">
  <div class="grid">
    <div class="card"><h3>Total Services</h3><div class="value">6</div><div class="sub">All microservices running</div></div>
    <div class="card"><h3>Availability SLO</h3><div class="value">99%</div><div class="sub">Target uptime</div></div>
    <div class="card"><h3>Latency SLO</h3><div class="value">≤200ms</div><div class="sub">p95 response time</div></div>
    <div class="card"><h3>Error Rate SLO</h3><div class="value">≤1%</div><div class="sub">Max allowed error rate</div></div>
  </div>

  <h2>🔧 Microservices Status</h2>
  <div class="services" id="services"></div>

  <div class="links">
    <a class="btn btn-blue" href="http://localhost:9090" target="_blank">📊 Prometheus</a>
    <a class="btn btn-green" href="http://localhost:3000" target="_blank">📈 Grafana</a>
    <a class="btn btn-purple" href="http://localhost:5001/health" target="_blank">🔐 Auth Health</a>
  </div>
</div>
<script>
const services = [
  { name: 'Auth Service',         port: 5001, path: '/health' },
  { name: 'Product Service',      port: 5002, path: '/health' },
  { name: 'Order Service',        port: 5003, path: '/health' },
  { name: 'Payment Service',      port: 5004, path: '/health' },
  { name: 'Notification Service', port: 5005, path: '/health' },
  { name: 'User Profile Service', port: 5006, path: '/health' },
];
const container = document.getElementById('services');
services.forEach(s => {
  const el = document.createElement('div');
  el.className = 'service';
  el.innerHTML = `<div class="dot loading" id="dot-${s.port}"></div><div><div class="service-name">${s.name}</div><div class="service-port">:${s.port}</div></div>`;
  el.onclick = () => window.open(`http://localhost:${s.port}${s.path}`, '_blank');
  container.appendChild(el);
});
</script>
</body>
</html>
