events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    upstream auth_service      { server auth-service:5001; }
    upstream product_service   { server product-service:5002; }
    upstream order_service     { server order-service:5003; }
    upstream payment_service   { server payment-service:5004; }
    upstream notification_svc  { server notification-service:5005; }
    upstream userprofile_svc   { server user-profile-service:5006; }

    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /api/auth/      { proxy_pass http://auth_service/; }
        location /api/products/  { proxy_pass http://product_service/; }
        location /api/orders/    { proxy_pass http://order_service/; }
        location /api/payments/  { proxy_pass http://payment_service/; }
        location /api/notify/    { proxy_pass http://notification_svc/; }
        location /api/users/     { proxy_pass http://userprofile_svc/; }

        location /health {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
